<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

     <link rel="icon" type="image/png" href="images/pizza.png" >
       <link rel="stylesheet" href="style.css">
         <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>PIZZAHUT</title>
</head>
<body>
     <h1>PIZZAHUT</h1>

 <div class="navbar">
    <nav>
        <ul>
            <li><a href="home.html">Home</a></li>
                <li><a href="personal_details.html">Personal Detail</a></li>    
                     
                         <li><a href="crust_type_&_size.html">Crust Type & Size</a></li> 
                             <li><a href="sauce_topping.html">Pizza_sauce & topping</a></li> 
                                  <li><a href="delivery_paymentmethod.html">Delivery Method and Payment</a></li>
                                        <li><a href="order_sum.html">Order Summary</a></li>       
                  </ul>
             </nav>
         </div>
        
        <div class="container">
            <fieldset class="formsize">
            <p ><div class="pizza_size"><i class="fa-solid fa-circle" style="color: rgb(126, 31, 31);margin-right: 1.25rem;"></i>Choose Pizza sizes</div></p>
    
        <div class="size">

        <div class="psmall">     
             <input type="radio" class="pizzaradio_btn" name="size" ></input>
            
             <img src="images/pizzasize.png" class="small_size_pizza" alt="Pizza size"  > 
            <label for="size1">small</label><br> 
        </div>

        <div class="pmedium">
        <input type="radio" class="pizzaradio_btn" name="size" checked="checked" ></input>
           
        <img src="images/pizzasize.png" class="medium_size_pizza"  alt="Pizza size">  
         <label for="size2">medium</label><br>
        </div>

        <div class="plarge">
        <input type="radio" class="pizzaradio_btn"  name="size" ></input><br>
   
        <img src="images/pizzasize.png" class="large_size_pizza"  alt="Pizza size">  
         <label for="size3">large</label>
        </div>

        <div class="pxlarge">
        <input type="radio" class="pizzaradio_btn"  name="size"></input><br>
        <img src="images/pizzasize.png" class="xlarge_size_pizza"  alt="Pizza size">  
        <label for="size4">Extra large</label>
       </div>
       <!-- each label must have its own id  -->
      
    </div>
<br>
</fieldset>

<fieldset class="formcrust">
<div class="crustlabel"><i class="fa-solid fa-pizza-slice" style="color: rgb(126, 31, 31);margin-right: 1.25rem;"></i><label for="crust">Choose a crust</label><br></div>
  
<div class="crust">
            <select name="crust" id="crust" required>
            <option selected placeholder="Choose a crust" disabled >choose a crust</option>
            <option>thin</option>
            <option>thick</option>
            <option>stuffed</option>
            <option>gluten-free</option>
        </select>
         <img src="images/pizza.png" alt="Pizza slice" class="pizza_slice">
           <button type="button" id="btn_crust" class="btn_next"><a href ="sauce_topping.html" style="text-decoration: none;color:white">Next</button>
           <button type="button" id="btn_crust" class="btn_next"><a href ="personal_details.html" style="text-decoration: none;color:white">Back</button>
        
        </fieldset>
    </div>
   
</div>
    
</body>
</html>
