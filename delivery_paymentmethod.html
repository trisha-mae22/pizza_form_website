         <fieldset class="formdelivery">
         <div class="deliverylabel"><i class="fa-solid fa-motorcycle" style="color: rgb(126, 31, 31);margin-right: 1.25rem;"></i>
 <label>Delivery Method</label><br></div>
     
         <div class="delivery_method">
       
            <input type="radio" class="pizzaradio_btn" id="home_delivery" name="d_m"></input>
            <label for="home_delivery">Home delivery</label><br>
            <input type="radio" class="pizzaradio_btn" id="pick_up" name="d_m"></input>
            <label for="pick_up">Store pick up</label><br>
            <label>
                <textarea placeholder="home address" rows="5" float="right" style="width: 450px;border-radius: 5px;"></textarea>
            </label>
    </div>
    <img src="images/loc.png " class="location_img">
    </fieldset>
<br>
<fieldset class="formpayment">
<div class="paymentlabel"><i class="fa-solid fa-wallet" style="color: rgb(126, 31, 31);margin-right: 1.25rem;"></i><label>Payment Information</label><br></div>

<div class="payment_info">
        
            <label>Payment Details</label>
            
            <select required>
                <option >Payment Method</option>
                <option>Credit card</option>
                <option>Gcash</option>
                <option>Cash on Delivery</option>
            </select>
            <br>
            <br>
              <label >Required for Credit Card only</label>
            <div class="card_input">
            <input type="text" class="name" id="card" pattern="[0-9]{16}" maxlength="16" placeholder="1236547896547852" ><i class="fa-regular fa-credit-card" style="color: rgb(184, 197, 193);"></i>
         </div>
    </div>
    <div class="wallet_img">
       <img src="images/wallet.png" class="wallet">
